version: "3.9"

services:
  backend:
    build: .
    container_name: foryou_backend
    restart: always
    ports:
      - "8081:8081"
    env_file: .envbackend
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8081"
      DEBUG: "False"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: foryou_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
